  <path d="M70 264H1330" stroke="url(#line)" stroke-width="4" stroke-linecap="round" stroke-dasharray="24 18" opacity="0.75">
    <animate attributeName="stroke-dashoffset" values="0;-420" dur="6s" repeatCount="indefinite"/>
  </path>
