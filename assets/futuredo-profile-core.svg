<svg width="1400" height="300" viewBox="0 0 1400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset="0.5" stop-color="#111827"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="line" x1="70" y1="40" x2="1330" y2="260" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="0.32" stop-color="#22C55E"/>
      <stop offset="0.66" stop-color="#A855F7"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feBlend in="SourceGraphic" in2="blur" mode="screen"/>
    </filter>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30 0H0V30" stroke="#93C5FD" stroke-opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1400" height="300" rx="30" fill="url(#bg)"/>
  <rect width="1400" height="300" rx="30" fill="url(#grid)"/>
  <rect x="24" y="24" width="1352" height="252" rx="26" stroke="url(#line)" stroke-width="2" stroke-opacity="0.7"/>

  <text x="70" y="78" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="40" font-weight="900">futuredo</text>
  <text x="70" y="116" fill="#67E8F9" font-family="JetBrains Mono, Consolas, monospace" font-size="18" font-weight="900">Wuhan Weipai Network Game Developer</text>
  <text x="70" y="148" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Unity / Unreal / AI / Full-Stack / Apple Ecosystem / DCC / Hardware</text>

  <g font-family="JetBrains Mono, Consolas, monospace" font-weight="900" filter="url(#glow)">
    <g transform="translate(70 188)">
      <rect width="190" height="58" rx="16" fill="#020617" fill-opacity="0.78" stroke="#38BDF8"/>
      <circle cx="34" cy="29" r="13" fill="#38BDF8"/>
      <text x="58" y="25" fill="#E0F2FE" font-size="15">Open Source</text>
      <text x="58" y="43" fill="#94A3B8" font-size="12">public builds</text>
    </g>
    <g transform="translate(290 188)">
      <rect width="190" height="58" rx="16" fill="#020617" fill-opacity="0.78" stroke="#22C55E"/>
      <circle cx="34" cy="29" r="13" fill="#22C55E"/>
      <text x="58" y="25" fill="#DCFCE7" font-size="15">Game Engine</text>
      <text x="58" y="43" fill="#94A3B8" font-size="12">playable systems</text>
    </g>
    <g transform="translate(510 188)">
      <rect width="190" height="58" rx="16" fill="#020617" fill-opacity="0.78" stroke="#A855F7"/>
      <circle cx="34" cy="29" r="13" fill="#A855F7"/>
      <text x="58" y="25" fill="#E9D5FF" font-size="15">AI Builder</text>
      <text x="58" y="43" fill="#94A3B8" font-size="12">agents + RAG</text>
    </g>
    <g transform="translate(730 188)">
      <rect width="190" height="58" rx="16" fill="#020617" fill-opacity="0.78" stroke="#F97316"/>
      <circle cx="34" cy="29" r="13" fill="#F97316"/>
      <text x="58" y="25" fill="#FED7AA" font-size="15">Native Apps</text>
      <text x="58" y="43" fill="#94A3B8" font-size="12">iOS + macOS</text>
    </g>
    <g transform="translate(950 188)">
      <rect width="190" height="58" rx="16" fill="#020617" fill-opacity="0.78" stroke="#14B8A6"/>
      <circle cx="34" cy="29" r="13" fill="#14B8A6"/>
      <text x="58" y="25" fill="#CCFBF1" font-size="15">Tech Art</text>
      <text x="58" y="43" fill="#94A3B8" font-size="12">shader + VFX</text>
    </g>
    <g transform="translate(1170 188)">
      <rect width="160" height="58" rx="16" fill="#020617" fill-opacity="0.78" stroke="#EF4444"/>
      <circle cx="34" cy="29" r="13" fill="#EF4444"/>
      <text x="58" y="25" fill="#FECACA" font-size="15">Hardware</text>
      <text x="58" y="43" fill="#94A3B8" font-size="12">PC + device</text>
    </g>
