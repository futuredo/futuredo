<svg width="1400" height="430" viewBox="0 0 1400 430" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="core" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(700 225) rotate(90) scale(190 360)">
      <stop stop-color="#1E293B"/>
      <stop offset="0.55" stop-color="#07111F"/>
      <stop offset="1" stop-color="#020617"/>
    </radialGradient>
    <linearGradient id="ring" x1="210" y1="60" x2="1190" y2="370" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="0.3" stop-color="#22C55E"/>
      <stop offset="0.55" stop-color="#F97316"/>
      <stop offset="0.82" stop-color="#A855F7"/>
      <stop offset="1" stop-color="#EF4444"/>
