<svg width="1400" height="520" viewBox="0 0 1400 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="520">
      <stop stop-color="#020617"/>
      <stop offset="0.5" stop-color="#101A3D"/>
      <stop offset="1" stop-color="#061B18"/>
    </linearGradient>
    <linearGradient id="pulse" x1="140" y1="80" x2="1260" y2="440">
      <stop stop-color="#38BDF8"/>
      <stop offset="0.35" stop-color="#A78BFA"/>
      <stop offset="0.68" stop-color="#F97316"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.16 0 0 0 0 0.73 0 0 0 0 1 0 0 0 0.9 0"/>
      <feBlend in2="SourceGraphic" mode="screen"/>
    </filter>
    <pattern id="grid" width="38" height="38" patternUnits="userSpaceOnUse">
      <path d="M38 0H0V38" stroke="#94A3B8" stroke-opacity="0.07"/>
    </pattern>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto">
      <path d="M0 0L9 3L0 6Z" fill="#38BDF8"/>
    </marker>
  </defs>

  <rect width="1400" height="520" rx="34" fill="url(#bg)"/>
  <rect width="1400" height="520" rx="34" fill="url(#grid)"/>
  <rect x="26" y="26" width="1348" height="468" rx="28" stroke="url(#pulse)" stroke-width="2" stroke-opacity="0.7"/>

  <text x="70" y="76" fill="#E0F2FE" font-family="JetBrains Mono, Consolas, monospace" font-size="22" font-weight="800">GAMEPLAY RUNTIME // FRAME GRAPH</text>
  <text x="70" y="116" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="40" font-weight="900">Input -> Ability -> Animation -> Physics -> Camera -> UI</text>
  <text x="72" y="150" fill="#94A3B8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20">A player-facing system map for engine-level gameplay thinking.</text>

  <g filter="url(#glow)">
    <path d="M190 292C260 168 431 148 535 234C657 335 767 340 870 236C980 126 1162 160 1210 292" stroke="#38BDF8" stroke-width="5" stroke-linecap="round" stroke-dasharray="18 16" marker-end="url(#arrow)">
      <animate attributeName="stroke-dashoffset" values="0;-340" dur="5.5s" repeatCount="indefinite"/>
    </path>
    <path d="M190 292C276 404 438 420 548 332C658 244 760 236 872 332C982 426 1162 405 1210 292" stroke="#A78BFA" stroke-width="4" stroke-linecap="round" stroke-dasharray="12 18" opacity="0.75">
      <animate attributeName="stroke-dashoffset" values="0;300" dur="6.5s" repeatCount="indefinite"/>
    </path>
  </g>

  <g font-family="JetBrains Mono, Consolas, monospace" font-size="17" font-weight="800">
    <g transform="translate(110 230)">
      <rect width="160" height="86" rx="18" fill="#020617" fill-opacity="0.86" stroke="#38BDF8"/>
      <text x="28" y="38" fill="#E0F2FE">INPUT</text>
      <text x="28" y="64" fill="#64748B">intent</text>
      <animateTransform attributeName="transform" type="translate" values="110 230;110 222;110 230" dur="2.4s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(322 166)">
      <rect width="180" height="96" rx="18" fill="#020617" fill-opacity="0.86" stroke="#A78BFA"/>
      <text x="24" y="40" fill="#EDE9FE">ABILITY</text>
      <text x="24" y="68" fill="#64748B">rules/state</text>
      <animateTransform attributeName="transform" type="translate" values="322 166;322 157;322 166" dur="2.8s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(575 292)">
      <rect width="190" height="96" rx="18" fill="#020617" fill-opacity="0.86" stroke="#22C55E"/>
      <text x="24" y="40" fill="#DCFCE7">ANIMATION</text>
      <text x="24" y="68" fill="#64748B">timing/feel</text>
      <animateTransform attributeName="transform" type="translate" values="575 292;575 282;575 292" dur="2.6s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(842 165)">
      <rect width="170" height="96" rx="18" fill="#020617" fill-opacity="0.86" stroke="#F97316"/>
      <text x="24" y="40" fill="#FFEDD5">PHYSICS</text>
      <text x="24" y="68" fill="#64748B">contacts</text>
      <animateTransform attributeName="transform" type="translate" values="842 165;842 156;842 165" dur="2.9s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(1105 230)">
      <rect width="175" height="86" rx="18" fill="#020617" fill-opacity="0.86" stroke="#38BDF8"/>
      <text x="24" y="38" fill="#E0F2FE">CAMERA</text>
      <text x="24" y="64" fill="#64748B">feedback</text>
      <animateTransform attributeName="transform" type="translate" values="1105 230;1105 220;1105 230" dur="2.5s" repeatCount="indefinite"/>
    </g>
  </g>

  <g transform="translate(76 382)" font-family="JetBrains Mono, Consolas, monospace">
    <rect width="1248" height="78" rx="18" fill="#020617" fill-opacity="0.74" stroke="#334155"/>
    <text x="26" y="32" fill="#F8FAFC" font-size="18" font-weight="800">FRAME BUDGET</text>
    <text x="26" y="58" fill="#94A3B8" font-size="15">input 0.2ms | gameplay 1.4ms | animation 0.8ms | physics 1.2ms | rendering 7.9ms | UI 0.6ms</text>
    <rect x="1020" y="24" width="170" height="14" rx="7" fill="#0F172A" stroke="#334155"/>
    <rect x="1020" y="24" width="124" height="14" rx="7" fill="#22C55E">
      <animate attributeName="width" values="94;148;124;168;112;124" dur="4.2s" repeatCount="indefinite"/>
    </rect>
    <text x="1208" y="38" fill="#22C55E" font-size="16" font-weight="800">60 FPS</text>
  </g>
</svg>
