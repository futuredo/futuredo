<svg width="1400" height="360" viewBox="0 0 1400 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#030712"/>
      <stop offset="0.45" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="hot" x1="86" y1="72" x2="1280" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE"/>
      <stop offset="0.25" stop-color="#22C55E"/>
      <stop offset="0.5" stop-color="#F97316"/>
      <stop offset="0.75" stop-color="#A855F7"/>
      <stop offset="1" stop-color="#EF4444"/>
    </linearGradient>
    <filter id="glow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feBlend in="SourceGraphic" in2="blur" mode="screen"/>
    </filter>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" stroke="#93C5FD" stroke-opacity="0.045"/>
    </pattern>
  </defs>

  <rect width="1400" height="360" rx="32" fill="url(#bg)"/>
  <rect width="1400" height="360" rx="32" fill="url(#grid)"/>
  <rect x="24" y="24" width="1352" height="312" rx="28" stroke="url(#hot)" stroke-width="2" stroke-opacity="0.64"/>

  <text x="70" y="76" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="36" font-weight="900">Runtime Dashboard</text>
  <text x="70" y="110" fill="#94A3B8" font-family="JetBrains Mono, Consolas, monospace" font-size="16" font-weight="800">engine / ai / app / dcc / hardware signals online</text>

  <g font-family="JetBrains Mono, Consolas, monospace">
    <g transform="translate(70 145)">
      <rect width="250" height="150" rx="20" fill="#020617" fill-opacity="0.72" stroke="#38BDF8" stroke-opacity="0.72"/>
      <text x="26" y="42" fill="#BAE6FD" font-size="15" font-weight="900">GAMEPLAY LOOP</text>
      <text x="26" y="78" fill="#F8FAFC" font-size="34" font-weight="900">60 FPS</text>
      <rect x="26" y="106" width="198" height="12" rx="6" fill="#0F172A"/>
      <rect x="26" y="106" width="158" height="12" rx="6" fill="#38BDF8" filter="url(#glow)">
        <animate attributeName="width" values="132;198;156;178;132" dur="4s" repeatCount="indefinite"/>
      </rect>
    </g>
    <g transform="translate(350 145)">
      <rect width="250" height="150" rx="20" fill="#020617" fill-opacity="0.72" stroke="#22C55E" stroke-opacity="0.72"/>
      <text x="26" y="42" fill="#BBF7D0" font-size="15" font-weight="900">AI PIPELINE</text>
      <text x="26" y="78" fill="#F8FAFC" font-size="34" font-weight="900">RAG + AGENT</text>
      <path d="M30 112H220" stroke="#22C55E" stroke-width="5" stroke-linecap="round" stroke-dasharray="18 12" filter="url(#glow)">
        <animate attributeName="stroke-dashoffset" values="0;-180" dur="3.2s" repeatCount="indefinite"/>
      </path>
    </g>
    <g transform="translate(630 145)">
      <rect width="250" height="150" rx="20" fill="#020617" fill-opacity="0.72" stroke="#F97316" stroke-opacity="0.72"/>
      <text x="26" y="42" fill="#FED7AA" font-size="15" font-weight="900">SHADER BUDGET</text>
      <text x="26" y="78" fill="#F8FAFC" font-size="34" font-weight="900">GPU READY</text>
      <g fill="#F97316" filter="url(#glow)">
        <rect x="30" y="112" width="18" height="14" rx="4"><animate attributeName="height" values="14;34;14" dur="1.8s" repeatCount="indefinite"/></rect>
        <rect x="60" y="100" width="18" height="26" rx="4"><animate attributeName="height" values="26;12;32;26" dur="2.1s" repeatCount="indefinite"/></rect>
        <rect x="90" y="92" width="18" height="34" rx="4"><animate attributeName="height" values="34;18;38;34" dur="2.4s" repeatCount="indefinite"/></rect>
        <rect x="120" y="104" width="18" height="22" rx="4"><animate attributeName="height" values="22;40;18;22" dur="2s" repeatCount="indefinite"/></rect>
        <rect x="150" y="88" width="18" height="38" rx="4"><animate attributeName="height" values="38;16;36;38" dur="2.6s" repeatCount="indefinite"/></rect>
      </g>
    </g>
    <g transform="translate(910 145)">
      <rect width="250" height="150" rx="20" fill="#020617" fill-opacity="0.72" stroke="#A855F7" stroke-opacity="0.72"/>
      <text x="26" y="42" fill="#E9D5FF" font-size="15" font-weight="900">APPLE NATIVE</text>
      <text x="26" y="78" fill="#F8FAFC" font-size="34" font-weight="900">SWIFT / METAL</text>
      <circle cx="126" cy="112" r="28" stroke="#A855F7" stroke-width="6" stroke-dasharray="58 30" filter="url(#glow)">
        <animateTransform attributeName="transform" type="rotate" values="0 126 112;360 126 112" dur="3s" repeatCount="indefinite"/>
      </circle>
    </g>
    <g transform="translate(1190 145)">
      <rect width="140" height="150" rx="20" fill="#020617" fill-opacity="0.72" stroke="#EF4444" stroke-opacity="0.72"/>
      <text x="22" y="42" fill="#FECACA" font-size="15" font-weight="900">HARDWARE</text>
      <text x="22" y="78" fill="#F8FAFC" font-size="28" font-weight="900">LOW</text>
      <text x="22" y="112" fill="#F8FAFC" font-size="28" font-weight="900">LEVEL</text>
      <circle cx="108" cy="112" r="10" fill="#EF4444" filter="url(#glow)">
        <animate attributeName="r" values="8;15;8" dur="1.7s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>
</svg>
