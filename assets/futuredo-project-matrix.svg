  <path d="M70 482H1330" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" stroke-dasharray="28 18" opacity="0.75" filter="url(#glow)">
    <animate attributeName="stroke-dashoffset" values="0;-460" dur="6s" repeatCount="indefinite"/>
  </path>
